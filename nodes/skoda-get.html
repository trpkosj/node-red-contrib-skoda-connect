<script type="text/javascript">
    RED.nodes.registerType('skoda-get',{
        category: 'car',
        color: '#4aa82e',
        defaults: {
            name: {value:""},
            queryParking:{
                value: false,
                required: false
            },
            queryClimater:{
                value: false,
                required: false
            },
            queryCharger:{
                value: false,
                required: false
            },
            queryMaintenance:{
                value: false,
                required: false
            },
        },
        inputs:1,
        outputs:1,
        icon: "arrow-in.svg",
        label: function() {
            return this.name||"skoda-get";
        },
        credentials: {
            email: { type: "text" },
            password: { type: "password" }
        }
    });
</script>

<script type="text/x-red" data-template-name="skoda-get">
    <div class="form-row">
        <label for="node-input-name"><i class="icon-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-email"><i class="icon-tag"></i> Email</label>
        <input type="text" id="node-input-email">
    </div>
    <div class="form-row">
        <label for="node-input-password"><i class="icon-tag"></i> Password</label>
        <input type="password" id="node-input-password">
    </div>

    <div class="form-row">
        <label for="node-input-queryParking"><i class="icon-tag"></i> Query parking position</label>
        <input type="checkbox" id="node-input-queryParking">
    </div>
    <div class="form-row">
        <label for="node-input-queryClimater"><i class="icon-tag"></i> Query air conditioning</label>
        <input type="checkbox" id="node-input-queryClimater">
    </div>
    <div class="form-row">
        <label for="node-input-queryCharger"><i class="icon-tag"></i> Query charging information</label>
        <input type="checkbox" id="node-input-queryCharger">
    </div>
    <div class="form-row">
        <label for="node-input-queryMaintenance"><i class="icon-tag"></i> Query maintenance information</label>
        <input type="checkbox" id="node-input-queryMaintenance">
    </div>
</script>

<script type="text/x-red" data-help-name="skoda-get">
    <p>A node to log in to MySkoda service and get vehicle data</p>

    <h3>Configuration</h3>
    <dl class="message-properties">
        <dt class="optional">Name<span class="property-type">string</span></dt>
        <dd>name of node</dd>

        <dt class="required">Email<span class="property-type">string</span></dt>
        <dd>Email of your MySkoda account</dd>

        <dt class="required">Password<span class="property-type">string</span></dt>
        <dd>Password of your MySkoda account</dd>

        <dt class="optional">Query parking position<span class="property-type">boolean</span></dt>
        <dd>include last known parking position</dd>

        <dt class="optional">Query air conditioning<span class="property-type">boolean</span></dt>
        <dd>include air conditioning status</dd>

        <dt class="optional">Query charging information<span class="property-type">boolean</span></dt>
        <dd>include charging status (EV/PHEV only)</dd>

        <dt class="optional">Query maintenance information<span class="property-type">boolean</span></dt>
        <dd>include maintenance report</dd>
    </dl>
    <h3>Inputs</h3>
    <p>Any input triggers the API call</p>

    <h3>Output</h3>
    <p>JSON object with vehicle info, status, driving range, and optional data for all cars in your MySkoda account</p>

    <h3>References</h3>
        <ul>
            <li><a href="https://www.myskoda.com/">MySkoda</a></li>
            <li><a href="https://github.com/trpkosj/node-red-contrib-myskoda">GitHub</a> - the nodes github repository</li>
        </ul>
</script>
