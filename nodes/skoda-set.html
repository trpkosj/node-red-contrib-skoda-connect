<script type="text/javascript">
    RED.nodes.registerType('skoda-set',{
        category: 'car',
        color: '#4aa82e',
        defaults: {
            name: {value:""},
            command:{
                value: "startAC",
                required: true
            },
        },
        inputs:1,
        outputs:1,
        icon: "arrow-in.svg",
        label: function() {
            return this.name||"skoda-set";
        },
        credentials: {
            email: { type: "text" },
            password: { type: "password" }
        }
    });
</script>

<script type="text/x-red" data-template-name="skoda-set">
    <div class="form-row">
        <label for="node-input-name"><i class="icon-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-email"><i class="icon-tag"></i> Email</label>
        <input type="text" id="node-input-email">
    </div>
    <div class="form-row">
        <label for="node-input-password"><i class="icon-tag"></i> Password</label>
        <input type="password" id="node-input-password">
    </div>
    <div class="form-row">
        <label for="node-input-command"><i class="icon-tag"></i> Command</label>
        <select id="node-input-command">
            <option value="startAC">Start Air Conditioning</option>
            <option value="stopAC">Stop Air Conditioning</option>
            <option value="temperature">Set Target Temperature</option>
            <option value="startWindowHeating">Start Window Heating</option>
            <option value="stopWindowHeating">Stop Window Heating</option>
            <option value="startCharging">Start Charging</option>
            <option value="stopCharging">Stop Charging</option>
            <option value="setChargeLimit">Set Charge Limit</option>
            <option value="lock">Lock Vehicle</option>
            <option value="unlock">Unlock Vehicle</option>
            <option value="honkAndFlash">Honk and Flash</option>
            <option value="flash">Flash</option>
            <option value="wakeup">Wake Up Vehicle</option>
        </select>
    </div>
</script>

<script type="text/x-red" data-help-name="skoda-set">
    <p>A node to log in to MySkoda and send commands to your vehicle</p>

    <h3>Configuration</h3>
    <dl class="message-properties">
        <dt class="optional">Name<span class="property-type">string</span></dt>
        <dd>name of node</dd>

        <dt class="required">Email<span class="property-type">string</span></dt>
        <dd>Email of your MySkoda account</dd>

        <dt class="required">Password<span class="property-type">string</span></dt>
        <dd>Password of your MySkoda account</dd>

        <dt class="required">Command<span class="property-type">string</span></dt>
        <dd>Choose a command from the list</dd>
    </dl>

    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt class="required">msg.vin<span class="property-type">string</span></dt>
        <dd>VIN number of car. Use the skoda-get node to query it.</dd>

        <dt class="optional">msg.payload<span class="property-type">number</span></dt>
        <dd>For "Set Target Temperature": temperature in Celsius (e.g. 21.5)<br/>
            For "Set Charge Limit": limit in percent (e.g. 80)</dd>

        <dt class="optional">msg.spin<span class="property-type">string</span></dt>
        <dd>Required for Lock/Unlock commands (your S-PIN)</dd>

        <dt class="optional">msg.latitude / msg.longitude<span class="property-type">number</span></dt>
        <dd>Required for Honk and Flash / Flash commands (vehicle position)</dd>
    </dl>

    <h3>Output</h3>
    <dl class="message-properties">
        <dt class="required">msg.payload<span class="property-type">object</span></dt>
        <dd>API response or {success: true}</dd>
    </dl>

    <h3>References</h3>
        <ul>
            <li><a href="https://www.myskoda.com/">MySkoda</a></li>
            <li><a href="https://github.com/trpkosj/node-red-contrib-myskoda">GitHub</a> - the nodes github repository</li>
        </ul>
</script>
